var D={};
function dsum(n){while(n>9&&n!==11&&n!==22&&n!==33){var s=0;String(n).split('').forEach(function(c){s+=+c});n=s;}return n}
function lpn(dob){var p=dob.split('-');return dsum(dsum(+p[2])+dsum(+p[1])+dsum(+p[0]))}
function destn(name){
  // Pythagorean — chỉ dùng chữ Latin không dấu
  var mp={a:1,b:2,c:3,d:4,e:5,f:8,g:3,h:5,i:1,j:1,k:2,l:3,m:4,n:5,o:7,p:8,q:1,r:2,s:3,t:4,u:6,v:6,w:6,x:5,y:1,z:7};
  // Chuyển tên tiếng Việt sang không dấu trước
  var noAccent=removeVietnamese(name);
  var s=0;noAccent.toLowerCase().replace(/\s/g,'').split('').forEach(function(c){if(mp[c])s+=mp[c]});
  return dsum(s)||1;
}
function souln(name){
  var mp={a:1,e:5,i:9,o:6,u:3},s=0;
  var noAccent=removeVietnamese(name);
  noAccent.toLowerCase().split('').forEach(function(c){if(mp[c])s+=mp[c]});
  return dsum(s)||1;
}
function pyrn(dob){var p=dob.split('-');return dsum(dsum(+p[2])+dsum(+p[1])+dsum(new Date().getFullYear()))}
function getAge(dob){var p=dob.split('-'),b=new Date(+p[0],+p[1]-1,+p[2]),n=new Date();var a=n.getFullYear()-b.getFullYear();if(n<new Date(n.getFullYear(),b.getMonth(),b.getDate()))a--;return a}

// Chuyển tiếng Việt có dấu → không dấu để tính thần số học
function removeVietnamese(str){
  var from='àáảãạâầấẩẫậăằắẳẵặèéẻẽẹêềếểễệìíỉĩịòóỏõọôồốổỗộơờớởỡợùúủũụưừứửữựỳýỷỹỵđÀÁẢÃẠÂẦẤẨẪẬĂẰẮẲẴẶÈÉẺẼẸÊỀẾỂỄỆÌÍỈĨỊÒÓỎÕỌÔỒỐỔỖỘƠỜỚỞỠỢÙÚỦŨỤƯỪỨỬỮỰỲÝỶỸỴĐ';
  var to  ='aaaaaaaaaaaaaaaaaeeeeeeeeeeeiiiiioooooooooooooooooouuuuuuuuuuuyyyyydAAAAAAAAAAAAAAAAEEEEEEEEEEEIIIIIOOOOOOOOOOOOOOOOOOUUUUUUUUUUUYYYYYD';
  for(var i=0;i<from.length;i++){str=str.replace(new RegExp(from[i],'g'),to[i]);}
  return str;
}

  '<div class="note-box"><p>⚠️ Số Định mệnh và Linh hồn được tính theo hệ Pythagorean dựa trên tên Latin không dấu. Kết quả có thể khác các web dùng hệ Chaldean hoặc map riêng cho tiếng Việt.</p></div>'+
  '<div class="div"></div><div class="sh">Số đường đời '+v.lp+' — '+lp.t+'</div>'+
  mkStars(lp.star)+
  box('Bản chất & sứ mệnh',lp.core)+box('Điểm mạnh',lp.str)+box('Thách thức cần vượt',lp.chal)+
  box('Tình yêu & quan hệ',lp.love)+box('Hướng sự nghiệp',lp.car)+box('Con số & màu may mắn',lp.lucky)+
  '<div class="div"></div><div class="sh">Số định mệnh '+v.dst+' — '+dst.t+'</div>'+
  box('Cách bạn thể hiện với thế giới',dst.core+' Phản ánh năng lực tiềm ẩn mà người ngoài nhìn thấy ở bạn.')+
  '<div class="div"></div><div class="sh">Số linh hồn '+v.soul+' — Khao khát sâu thẳm</div>'+
  box('Điều gì thôi thúc bạn từ bên trong?',sl.core+' Đây là con số ẩn — mong muốn thực sự mà đôi khi chính bạn chưa nhận ra.')+
  '<div class="div"></div><div class="sh">Năm cá nhân '+v.py+' — Chủ đề '+new Date().getFullYear()+'</div>'+
  box('Năng lượng năm nay',py.core+' Thế mạnh cần tận dụng: '+py.str);
}

  document.getElementById('p-ct').innerHTML=

  '<div class="mg">'+

  '<div class="mc"><div class="ml">Hành tinh trị vì</div><div class="mv" style="font-size:.9rem;line-height:1.3">'+z.ruler+'</div></div>'+
  '</div>'+
  box('Tính cách cốt lõi',z.desc)+
  box('Tình yêu & quan hệ',z.love)+
  box('Sự nghiệp & thế mạnh',z.career)+
  box('Sức khỏe cần lưu ý',z.health)+
  box('Ngày may · Con số · Màu',z.lucky)+

  '<p>Cung Mặt Trăng và Cung Mọc cần tính toán từ <strong>ephemeris thiên văn chuyên dụng</strong> — không thể tính chính xác bằng công thức đơn giản. Bất kỳ kết quả nào hiển thị mà không dùng Swiss Ephemeris đều chỉ là ước tính có thể sai.</p>'+
  '<p>Để xem chính xác, nhấn nút bên dưới — Astro.com sẽ tính đúng cho ngày <strong>'+v.d+'/'+v.m+'/'+v.y+(v.timeStr?' lúc '+v.timeStr:'')+'</strong>:</p>'+
  '<a class="astro-link" href="'+aLink+'" target="_blank">Xem lá số đầy đủ trên Astro.com ↗</a>'+
  '</div></div>'+

  box('Sao Thủy (Mercury) — Tư duy & giao tiếp','Ảnh hưởng cách bạn suy nghĩ, học hỏi và diễn đạt ý tưởng.')+
  box('Sao Hỏa (Mars) — Hành động & năng lượng','Thúc đẩy tham vọng, động lực và cách đối mặt xung đột.')+
  box('Sao Mộc (Jupiter) — May mắn & mở rộng','Mang đến cơ hội phát triển và những vận may bất ngờ.')+
  box('Sao Thổ (Saturn) — Kỷ luật & bài học','Tạo ra cấu trúc và những bài học sâu sắc định hình con người bạn.');

function buildGY(){
  var v=D,lp=LPD[v.lp]||LPD[1],ed=EL[v.napam]||EL.Thổ;
  var html='<div class="sh">Gợi ý cá nhân hoá</div>';
  if(v.job){
    var jl=v.job.toLowerCase(),body='';
    if(jl.includes('kế toán')||jl.includes('tài chính')||jl.includes('audit')||jl.includes('kiểm toán')){
      body='Với nghề <strong>'+v.job+'</strong> và số đường đời '+v.lp+', bạn đang đi đúng hướng. Chứng chỉ quốc tế (CPA, ACCA, CFA) sẽ là bước đệm mạnh cho 3–5 năm tới.';
    } else if(jl.includes('sinh viên')||jl.includes('học sinh')){
      body='Giai đoạn học tập rất quan trọng. Số đường đời '+v.lp+' gợi ý hướng phù hợp: <strong>'+lp.car+'</strong>. Hãy tìm internship và trải nghiệm thực tế sớm nhất có thể.';
    } else {
      body='Với công việc <strong>'+v.job+'</strong>, điểm mạnh cần khai thác: '+lp.str+'. Thách thức cần nhận thức: '+lp.chal+'.';
    }
    html+=sugg('Nghề nghiệp & phát triển',body);
  }
  if(v.live) html+=sugg('Phong thủy — '+v.live,'Người mạng <strong>'+v.napam+'</strong> ('+v.napamFull+'): '+ed.phongtuy);
  if(v.goal){
    var g=v.goal.toLowerCase(),gb='';
    if(g.includes('tình duyên')||g.includes('tình yêu')){
      gb=v.zodName+' trong tình yêu: '+v.zod.love+' Mạng '+v.napam+': '+ed.duyen;
    } else if(g.includes('sự nghiệp')||g.includes('công việc')){
      gb='Thành công đến từ: <strong>'+lp.str+'</strong>. Thách thức lớn nhất: '+lp.chal+'.';
    } else if(g.includes('tài chính')||g.includes('đầu tư')){
      gb='Mạng '+v.napam+' về tài lộc: '+ed.tai;
    } else {
      gb='Chìa khóa cho "'+v.goal+'": khai thác điểm mạnh ('+lp.str+') và vượt qua thách thức ('+lp.chal+').';
    }
    html+=sugg('Định hướng: '+v.goal,gb);
  }
  if(v.marital){
    var mt={'doc-than':'Giai đoạn độc thân là cơ hội khám phá bản thân. '+v.zodName+': '+v.zod.love,'co-doi':'Chú trọng giao tiếp cởi mở. Đừng để áp lực bên ngoài ảnh hưởng đến kết nối cảm xúc.','ket-hon':'Hôn nhân vững bền khi cả hai cùng phát triển. Cân bằng sự nghiệp và gia đình.','ly-hon':'Giai đoạn tái xuất phát. Mỗi kết thúc là một khởi đầu mới tốt đẹp hơn.'};
    html+=sugg('Tình duyên & gia đình',mt[v.marital]||'');
  }
  if(!v.job&&!v.live&&!v.goal&&!v.marital) html+=box('Thêm thông tin để nhận gợi ý','Điền nghề nghiệp, nơi ở, mục tiêu hoặc tình trạng hôn nhân để nhận phân tích cá nhân hoá.');
  html+='<div class="warn"><p><strong>Lưu ý:</strong> Tử vi, thần số học và chiêm tinh học là công cụ khám phá bản thân — không phải lời tiên đoán tuyệt đối. Ý chí và hành động của bạn mới là yếu tố quyết định cuối cùng.</p></div>';
  document.getElementById('p-gy').innerHTML=html;
}
</script>
